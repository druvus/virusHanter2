# Example config for refresh/refresh_virus_parquet.smk.
#
# Copy this file alongside as refresh/config.local.yaml and edit
# the paths, then run:
#
#   snakemake -s refresh/refresh_virus_parquet.smk \
#       --configfile refresh/config.local.yaml --cores 4 \
#       --sdm conda

# Where the final parquet should land. The path the main pipeline
# config points at via VIRUS_PARQUET.
OUTPUT_PARQUET: "/data/ref_dbs/INDIVIDUAL_VIRUS_FASTA/all_viruses.parquet"

# Working directory for the FASTA, accession2taxid and taxdump
# downloads. Pick a location with at least 40 GB free.
DOWNLOAD_DIR: "/data/ref_dbs/INDIVIDUAL_VIRUS_FASTA/_refresh_workdir"

# Production Kraken2 viral DB. The `compare_with_kraken2` rule
# calls `kraken2-inspect` against this DB to compute overlap with
# the parquet's taxid universe and writes the result to a sidecar
# TSV next to the parquet.
KRAKEN_DB_FOR_COMPARE: "/data/ref_dbs/KRAKEN_DB/k2_viral_20260226"

# BLAST DB tarballs the `refresh_blast` rule fetches via
# `update_blastdb.pl`. The defaults match the production
# `viral_rna_mito.nal` alias the main pipeline points at; override
# `BLAST_NAMES` if you maintain a different alias mix locally.
# `BLAST_PUBLISH_DIR` defaults to a sibling directory next to the
# parquet so all four classifier DBs share a coordinated snapshot.
# BLAST_NAMES:       ["ref_viruses_rep_genomes", "mito_rna_db", "taxdb"]
# BLAST_PUBLISH_DIR: "/data/ref_dbs/INDIVIDUAL_VIRUS_FASTA/blast_refseq_viral"

# Source URLs. Override if you want a different snapshot. The
# defaults pull the full multi-part NCBI viral RefSeq release
# (genomic + protein) and the matching nucleotide + protein
# accession2taxid mappings.
# REFSEQ_VIRAL_URL_DIR:     "https://ftp.ncbi.nlm.nih.gov/refseq/release/viral/"
# ACCESSION2TAXID_URL:      "https://ftp.ncbi.nlm.nih.gov/pub/taxonomy/accession2taxid/nucl_gb.accession2taxid.gz"
# PROT_ACCESSION2TAXID_URL: "https://ftp.ncbi.nlm.nih.gov/pub/taxonomy/accession2taxid/prot.accession2taxid.gz"
# TAXDUMP_URL:              "https://ftp.ncbi.nlm.nih.gov/pub/taxonomy/taxdump.tar.gz"
