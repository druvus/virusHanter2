$schema: "http://json-schema.org/draft-07/schema#"
title: virusHanter2 configuration
description: |
  Schema for config/config.yaml. Validated at workflow parse time via
  snakemake.utils.validate(). Catches the most common misconfiguration:
  leaving the example "/path/to/..." placeholders in the config file.
type: object

properties:
  SAMPLES:
    type: string
    description: Directory containing paired-end sequencing files.
    not:
      pattern: "^/path/to/"
  RESULTS_FOLDER:
    type: string
    description: Output root.
    not:
      pattern: "^/path/to/"
  THREADS:
    type: integer
    minimum: 1
  CLEAN:
    type: string
    enum: ["TRUE", "FALSE"]
  HUMAN_INDEX:
    type: string
    description: BWA index prefix for the host (human) genome.
    not:
      pattern: "^/path/to/"
  KAIJU_DB:
    type: string
    description: Kaiju database directory (.fmi + names.dmp + nodes.dmp).
    not:
      pattern: "^/path/to/"
  KRAKEN_DB:
    type: string
    description: Kraken2 database directory.
    not:
      pattern: "^/path/to/"
  BLASTN_DB:
    type: string
    description: BLAST nucleotide database prefix.
    not:
      pattern: "^/path/to/"
  CHECKV_DB:
    type: string
    description: CheckV database directory.
    not:
      pattern: "^/path/to/"
  VIRUS_PARQUET:
    type: string
    description: Parquet of (name, sequence, tax_id) viral references.
    not:
      pattern: "^/path/to/"
  CONTIG_LENGTH:
    type: integer
    minimum: 1
    default: 500
  PLOT_THRESHOLD:
    type: integer
    minimum: 0
  NUMBER_OF_PLOTS:
    type: integer
    minimum: 1
  PILON_MEM:
    type: string
    pattern: "^[0-9]+[Gg]$"
    default: "50G"
  MULTIQC:
    type: string
    enum: ["TRUE", "FALSE"]
    default: "TRUE"
  GENOMAD:
    type: string
    enum: ["TRUE", "FALSE"]
    default: "FALSE"
  GENOMAD_DB:
    type: string
    description: |
      Path to the populated geNomad database directory (the
      `genomad_db/` produced by `genomad download-database <dir>`,
      or extracted from https://zenodo.org/records/14886553).
      Required when `GENOMAD` is "TRUE"; ignored when off.
      Empty string is acceptable when off.
  MEGAHIT_MEM_FRACTION:
    type: number
    minimum: 0.01
    maximum: 1.0
    default: 0.5
  COVERAGE_WINDOW:
    type: integer
    minimum: 1
    default: 100
    description: |
      Window size in base pairs passed to `mosdepth --by`. Controls
      the resolution of the coverage trace rendered by reporthanter.
      Smaller values give a finer trace and a larger regions.bed.gz.
  DEDUPLICATE:
    type: string
    enum: ["TRUE", "FALSE"]
    default: "FALSE"
    description: |
      When "TRUE", PCR duplicates marked by samtools markdup on the
      host alignment are excluded from the host-removed BAM that feeds
      MEGAHIT and the BWA-to-Kraken-hits coverage step. Off by default
      to preserve byte-identical parity with the original virusHanter
      outputs; turn on for low-input clinical libraries where duplicate
      inflation biases coverage interpretation.
  QUAST:
    type: string
    enum: ["TRUE", "FALSE"]
    default: "FALSE"
    description: |
      When "TRUE", QUAST runs on each sample's MEGAHIT contigs and the
      report is included in the MultiQC aggregate. Off by default;
      enables N50, largest contig, total assembled length and similar
      assembly metrics for batch-level QC triage.
  SECONDARY_HOST_INDEX:
    type: string
    description: Optional BWA index for a secondary host.
  SECONDARY_HOST_NAME:
    type: string
    description: Display name for the secondary host (e.g. "Mouse").

required:
  - SAMPLES
  - RESULTS_FOLDER
  - THREADS
  - HUMAN_INDEX
  - KAIJU_DB
  - KRAKEN_DB
  - BLASTN_DB
  - CHECKV_DB
  - VIRUS_PARQUET
  - PLOT_THRESHOLD
  - NUMBER_OF_PLOTS

additionalProperties: false
