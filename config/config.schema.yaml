$schema: "http://json-schema.org/draft-07/schema#"
title: virusHanter2 configuration
description: |
  Schema for config/config.yaml. Validated at workflow parse time via
  snakemake.utils.validate(). Catches the most common misconfiguration:
  leaving the example "/path/to/..." placeholders in the config file.
type: object

properties:
  SAMPLES:
    type: string
    description: Directory containing paired-end sequencing files.
    not:
      pattern: "^/path/to/"
  RESULTS_FOLDER:
    type: string
    description: Output root.
    not:
      pattern: "^/path/to/"
  THREADS:
    type: integer
    minimum: 1
  CLEAN:
    type: string
    enum: ["TRUE", "FALSE"]
  HUMAN_INDEX:
    type: string
    description: BWA index prefix for the host (human) genome.
    not:
      pattern: "^/path/to/"
  KAIJU_DB:
    type: string
    description: Kaiju database directory (.fmi + names.dmp + nodes.dmp).
    not:
      pattern: "^/path/to/"
  KRAKEN_DB:
    type: string
    description: Kraken2 database directory.
    not:
      pattern: "^/path/to/"
  BLASTN_DB:
    type: string
    description: BLAST nucleotide database prefix.
    not:
      pattern: "^/path/to/"
  CHECKV_DB:
    type: string
    description: CheckV database directory.
    not:
      pattern: "^/path/to/"
  VIRUS_PARQUET:
    type: string
    description: Parquet of (name, sequence, tax_id) viral references.
    not:
      pattern: "^/path/to/"
  CONTIG_LENGTH:
    type: integer
    minimum: 1
    default: 500
  NUMBER_OF_PLOTS:
    type: integer
    minimum: 1
    description: |
      Top-N Kraken viral hits used by `bwa_align_to_kraken_hits` to
      select references for the coverage BAM, and the same cap drives
      the per-virus CSV row count emitted by `per_virus_metrics`.
  PILON_MEM:
    type: string
    pattern: "^[0-9]+[Gg]$"
    default: "50G"
  MULTIQC:
    type: string
    enum: ["TRUE", "FALSE"]
    default: "TRUE"
  GENOMAD:
    type: string
    enum: ["TRUE", "FALSE"]
    default: "FALSE"
  GENOMAD_SPLITS:
    type: integer
    minimum: 0
    default: 4
    description: |
      Number of splits passed to ``genomad --splits``. Higher values
      reduce peak memory for the embedded ``mmseqs prefilter`` step
      at the cost of run time. Default 4 keeps the peak memory under
      ~6 GB on a typical viral-metagenomics sample and prevents the
      OOM SIGKILL that fires on Apple Silicon laptops when geNomad
      processes metaSPAdes contigs (which produce ~3x more proteins
      than MEGAHIT). Set to 0 on Linux machines with abundant RAM
      to restore mmseqs2's auto-split behaviour.
  GENOMAD_DB:
    type: string
    description: |
      Path to the populated geNomad database directory (the
      `genomad_db/` produced by `genomad download-database <dir>`,
      or extracted from https://zenodo.org/records/14886553).
      Required when `GENOMAD` is "TRUE"; ignored when off.
      Empty string is acceptable when off.
  MEGAHIT_MEM_FRACTION:
    type: number
    minimum: 0.01
    maximum: 1.0
    default: 0.5
  COVERAGE_WINDOW:
    type: integer
    minimum: 1
    default: 100
    description: |
      Window size in base pairs passed to `mosdepth --by`. Controls
      the resolution of the coverage trace rendered by reporthanter.
      Smaller values give a finer trace and a larger regions.bed.gz.
  DEDUPLICATE:
    type: string
    enum: ["TRUE", "FALSE"]
    default: "FALSE"
    description: |
      When "TRUE", PCR duplicates marked by samtools markdup on the
      host alignment are excluded from the host-removed BAM that feeds
      MEGAHIT and the BWA-to-Kraken-hits coverage step. Off by default
      to preserve byte-identical parity with the original virusHanter
      outputs; turn on for low-input clinical libraries where duplicate
      inflation biases coverage interpretation.
  QUAST:
    type: string
    enum: ["TRUE", "FALSE"]
    default: "FALSE"
    description: |
      When "TRUE", QUAST runs on each sample's MEGAHIT contigs and the
      report is included in the MultiQC aggregate. Off by default;
      enables N50, largest contig, total assembled length and similar
      assembly metrics for batch-level QC triage.
  TAXDUMP_NODES:
    type: string
    default: ""
    description: |
      Optional path to the uncompressed NCBI ``nodes.dmp`` (extracted
      from ``taxdump.tar.gz``). When supplied, ``bwa_align_to_kraken_hits``
      applies the rank filter listed in COVERAGE_RANK_FILTER and (if
      COVERAGE_GENUS_WALKUP is on) walks missing taxids up to their
      genus before declaring them unmapped. Refresh alongside the
      parquet via ``refresh/refresh_virus_parquet.smk``.
  COVERAGE_RANK_FILTER:
    type: array
    items:
      type: string
    default:
      - "acellular root"
      - "realm"
      - "kingdom"
      - "subkingdom"
      - "phylum"
      - "subphylum"
      - "class"
      - "subclass"
      - "order"
      - "suborder"
      - "family"
      - "subfamily"
    description: |
      NCBI rank strings that classifier hits are dropped at before
      they enter the BWA reference union. Higher-rank propagation
      rows (Viruses, Cardeaviricetes, Anelloviridae, ...) have no
      per-taxid sequence and are pure noise in the unmapped sidecar
      when classifiers report them alongside their species/strain
      descendants. Requires TAXDUMP_NODES to be populated; set to
      ``[]`` to disable.
  COVERAGE_GENUS_WALKUP:
    type: string
    enum: ["TRUE", "FALSE"]
    default: "TRUE"
    description: |
      When ``TRUE``, classifier hits whose tax_id is absent from
      VIRUS_PARQUET are walked up to their genus via the taxdump
      and a representative genus reference is substituted. The
      virus_names sidecar tags the substitution in its sources
      column (e.g. ``kraken->genus``). Requires TAXDUMP_NODES.
  COVERAGE_SOURCES:
    type: array
    items:
      type: string
      enum: ["KRAKEN", "KAIJU", "BLAST"]
    minItems: 1
    uniqueItems: true
    default: ["KRAKEN", "KAIJU", "BLAST"]
    description: |
      Which classifiers contribute taxids to the BWA reference set
      used by mosdepth coverage. Default is the union of all three
      so the Alignment Coverage panel reflects every classifier's
      evidence. Set to ["KRAKEN"] to recover the pre-multi-source
      behaviour (Kraken top-N only).
  COVERAGE_TOP_N:
    type: integer
    minimum: 1
    default: 20
    description: |
      Per-classifier cap on the number of viral hits whose taxids
      enter the BWA reference set. Applied independently to each
      classifier listed in COVERAGE_SOURCES; the union of the
      per-classifier top-Ns drives reference selection.
  ASSEMBLERS:
    type: array
    items:
      type: string
      enum: ["MEGAHIT", "metaSPAdes", "rnaviralSPAdes"]
    minItems: 1
    uniqueItems: true
    default: ["MEGAHIT", "metaSPAdes", "rnaviralSPAdes"]
    description: |
      List of de novo assemblers to run on the host-removed read pool.
      Each assembler runs independently through Pilon, BLASTN, CheckV
      and (when enabled) geNomad / QUAST; per-assembler results
      accumulate under
      `{RESULTS_FOLDER}/{batch}/{sample}/{assembler}/`. The report
      and per-virus aggregation combine the per-assembler tables
      and add an `assembler` column.

      Choices:
        - MEGAHIT — fast k-mer-step metagenome assembler.
        - metaSPAdes — SPAdes `--meta`, designed for mixed
          DNA/RNA viral metagenomes.
        - rnaviralSPAdes — SPAdes `--rnaviral`, tuned for the
          coverage variance and large insert-size distributions
          typical of RNA virus libraries. Useful in addition to
          metaSPAdes for samples enriched in RNA viruses
          (orthomyxo, paramyxo, picornaviridae).

      The default runs all three; reduce the list when you do not
      want one (e.g. `["MEGAHIT"]` to recover byte-identical
      parity with the original `virusHanter`).

      The deprecated alias `"SPAdes"` is rejected at workflow load
      with a migration hint; rename it to `"metaSPAdes"` in your
      config.
  HOST_REMOVAL:
    type: string
    enum: ["bwa", "hostile"]
    default: "bwa"
    description: |
      Host-removal backend. `bwa` (parity default) runs
      `bwa mem -k 26` against `HUMAN_INDEX` and extracts unmapped
      pairs via `samtools view -f 12`. `hostile` runs the Bede
      et al. hostile tool against the bundled T2T-CHM13 + alt +
      decoy human reference; catches telomeric, centromeric and
      segmental-duplication host reads that GRCh38-based BWA
      misses. Requires `envs/hostile.yaml` and (optionally)
      `HOSTILE_INDEX` pointing at a pre-downloaded T2T-CHM13
      bundle; if empty, hostile downloads to its own cache on
      first use.
  HOSTILE_INDEX:
    type: string
    default: ""
    description: |
      Either a path to a pre-downloaded hostile index directory
      or the bare name of a hostile-managed index (e.g.
      ``human-t2t-hla.rs-viral-202401_ml-phage-202401``). Only
      consulted when `HOST_REMOVAL: "hostile"`. When empty, the
      rule passes
      `--index human-t2t-hla.rs-viral-202401_ml-phage-202401`,
      hostile's masked variant that preserves reads from
      endogenous retroviruses, phages and host-embedded viral
      elements — the reads a viral metagenomics pipeline must
      keep. The bare `human-t2t-hla` index drops those reads as
      host; only override if you have a specific reason.
  SECONDARY_HOST_INDEX:
    type: string
    description: Optional BWA index for a secondary host.
  SECONDARY_HOST_NAME:
    type: string
    description: Display name for the secondary host (e.g. "Mouse").

required:
  - SAMPLES
  - RESULTS_FOLDER
  - THREADS
  - HUMAN_INDEX
  - KAIJU_DB
  - KRAKEN_DB
  - BLASTN_DB
  - CHECKV_DB
  - VIRUS_PARQUET
  - NUMBER_OF_PLOTS

additionalProperties: false
