# End-to-end production-shape run against three real subsampled
# samples (127/128/129) from the DRVV7 MiSeq batch, using the small
# viral Kraken2 + Kaiju databases so the run fits on a laptop.
#
# Invoke:
#   conda activate virushanter
#   cd virusHanter2
#   snakemake -n --sdm conda --configfile config/config.real_subsample.yaml
#   snakemake    --sdm conda --cores 4 --configfile config/config.real_subsample.yaml

SAMPLES: "/Users/andreassjodin/Code/regionen/scratch/real_subsample_drvv7"
RESULTS_FOLDER: "/Users/andreassjodin/Code/regionen/scratch/results"
THREADS: 4
CLEAN: "FALSE"

HUMAN_INDEX:   "/Volumes/LaCie/REGIONEN/ref_dbs/BWA_GENCODE_GRCH38/human_gencode"
KAIJU_DB:      "/Volumes/LaCie/REGIONEN/ref_dbs/KAIJU_DB/viruses"
KRAKEN_DB:     "/Volumes/LaCie/REGIONEN/ref_dbs/KRAKEN_DB/k2_viral_20260226"
BLASTN_DB:     "/Volumes/LaCie/REGIONEN/ref_dbs/BLAST_DB/blast_db/viral_rna_mito"
CHECKV_DB:     "/Volumes/LaCie/REGIONEN/ref_dbs/CHECKV_DB/checkv-db-v1.5"
VIRUS_PARQUET: "/Volumes/LaCie/REGIONEN/ref_dbs/INDIVIDUAL_VIRUS_FASTA/all_viruses.parquet"

# Match the original virusHanter defaults so a parity diff stays
# meaningful.
CONTIG_LENGTH: 500
NUMBER_OF_PLOTS: 10
COVERAGE_WINDOW: 100
PILON_MEM: "8G"
# Apple Silicon: keep MEGAHIT's RAM request moderate so it never
# triggers the small-input k=21 SIGSEGV path. --k-min 27 is also set
# automatically in rules/assembly.smk on Darwin/arm64.
MEGAHIT_MEM_FRACTION: 0.5

# Opt-in stages off by default for the first end-to-end run; flip
# any of them on once the parity-locked baseline is captured.
MULTIQC:     "TRUE"
DEDUPLICATE: "FALSE"
QUAST:       "FALSE"
GENOMAD:     "FALSE"
