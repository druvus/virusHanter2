# HSV-2 detection test on a single sample from the DL62T batch.
# Shape mirrors config.drrkk_excl138.yaml; only the input folder
# changes. Run:
#   conda activate virushanter
#   cd virusHanter2
#   snakemake -n --sdm conda --configfile config/config.dl62t_sample26.yaml
#   snakemake    --sdm conda --cores 4 --configfile config/config.dl62t_sample26.yaml

SAMPLES: "/Users/andreassjodin/Code/regionen/scratch/dl62t_sample26"
RESULTS_FOLDER: "/Users/andreassjodin/Code/regionen/scratch/results"
THREADS: 4
CLEAN: "FALSE"

HUMAN_INDEX:   "/data/ref_dbs/BWA_GENCODE_GRCH38/human_gencode"
KAIJU_DB:      "/data/ref_dbs/INDIVIDUAL_VIRUS_FASTA/kaiju_refseq_viral"
KRAKEN_DB:     "/data/ref_dbs/INDIVIDUAL_VIRUS_FASTA/kraken2_refseq_viral"
BLASTN_DB:     "/data/ref_dbs/BLAST_DB/blast_db/viral_rna_mito"
CHECKV_DB:     "/data/ref_dbs/CHECKV_DB/checkv-db-v1.5"
VIRUS_PARQUET: "/data/ref_dbs/INDIVIDUAL_VIRUS_FASTA/all_viruses.parquet"
TAXDUMP_NODES: "/data/ref_dbs/INDIVIDUAL_VIRUS_FASTA/nodes.dmp"

CONTIG_LENGTH: 500
NUMBER_OF_PLOTS: 10
COVERAGE_WINDOW: 100
PILON_MEM: "8G"
MEGAHIT_MEM_FRACTION: 0.5

MULTIQC:     "TRUE"
DEDUPLICATE: "FALSE"
QUAST:       "TRUE"
GENOMAD:     "TRUE"
GENOMAD_DB:  "/data/ref_dbs/GENOMAD_DB/genomad_db"
