# config/config.yaml

# Path to the directory containing your raw sequencing data
SAMPLES: "/path/to/your/samples"

# Path to the directory where results will be stored
RESULTS_FOLDER: "/path/to/your/results"

# Number of threads to use for multi-threaded tools
THREADS: 8

# Whether to clean up intermediate files after the pipeline finishes
# Set to "TRUE" or "FALSE"
CLEAN: "FALSE"

# Path to the BWA index for the human genome (used for contamination removal)
HUMAN_INDEX: "/path/to/human/genome/index"

# Path to the Kaiju database directory
KAIJU_DB: "/path/to/kaiju/database"

# Path to the Kraken2 database
KRAKEN_DB: "/path/to/kraken2/database"

# Path to the BLASTN nucleotide database
BLASTN_DB: "/path/to/blastn/database"

# Minimum contig length to keep after assembly. Matches the original
# virusHanter default; the fallback in assembly.smk is also 500.
CONTIG_LENGTH: 500

# Path to the CheckV database
CHECKV_DB: "/path/to/checkv/database"

# Path to the Parquet file containing viral sequences (used for coverage plots)
VIRUS_PARQUET: "/path/to/virus_sequences.parquet"

# Number of top Kraken viral hits to map reads against. Same cap drives
# the per-virus CSV row count.
NUMBER_OF_PLOTS: 10

# Window size (bp) for mosdepth --by; controls coverage-trace resolution.
COVERAGE_WINDOW: 100

# Optional: run MultiQC over the whole batch at the end of the workflow
# and write {RESULTS_FOLDER}/<batch>/multiqc_report.html. Set to "FALSE"
# to skip. Default is "TRUE".
MULTIQC: "TRUE"

# Optional: exclude PCR duplicates from the host-removed reads that
# feed MEGAHIT and the BWA-to-Kraken-hits coverage step. Off by default
# to preserve parity with the original virusHanter outputs.
DEDUPLICATE: "FALSE"

# Optional: run QUAST on each sample's MEGAHIT contigs and feed the
# report to MultiQC. Off by default.
QUAST: "FALSE"

# Optional: run geNomad as a second viral-contig classifier alongside
# CheckV. Off by default for parity. Flip to "TRUE" and set
# GENOMAD_DB to the populated `genomad_db/` directory produced by
# `genomad download-database <dir>` (or the Zenodo manual fallback).
# See docs/REFERENCE_DBS.md.
GENOMAD: "FALSE"
GENOMAD_DB: ""

# Optional: Path to the BWA index for a secondary host genome (e.g., mouse)
# If not using a secondary host, comment out or remove these lines
# SECONDARY_HOST_INDEX: "/path/to/secondary/host/genome/index"
# SECONDARY_HOST_NAME: "Mouse"

# End of config.yaml