# End-to-end production-shape run against the eight DRRKK samples
# (135-142), using the small viral Kraken2 + Kaiju databases so the
# run fits on a laptop.
#
# Invoke:
#   conda activate virushanter
#   cd virusHanter2
#   snakemake -n --sdm conda --configfile config/config.drrkk.yaml
#   snakemake    --sdm conda --cores 4 --configfile config/config.drrkk.yaml

SAMPLES: "/Users/andreassjodin/Code/regionen/scratch/drrkk_excl138"
RESULTS_FOLDER: "/Users/andreassjodin/Code/regionen/scratch/results"
THREADS: 4
CLEAN: "FALSE"

HUMAN_INDEX:   "/Volumes/LaCie/REGIONEN/ref_dbs/BWA_GENCODE_GRCH38/human_gencode"
KAIJU_DB:      "/Volumes/LaCie/REGIONEN/ref_dbs/KAIJU_DB/viruses"
KRAKEN_DB:     "/Volumes/LaCie/REGIONEN/ref_dbs/KRAKEN_DB/k2_viral_20260226"
BLASTN_DB:     "/Volumes/LaCie/REGIONEN/ref_dbs/BLAST_DB/blast_db/viral_rna_mito"
CHECKV_DB:     "/Volumes/LaCie/REGIONEN/ref_dbs/CHECKV_DB/checkv-db-v1.5"
VIRUS_PARQUET: "/Volumes/LaCie/REGIONEN/ref_dbs/INDIVIDUAL_VIRUS_FASTA/all_viruses.parquet"

CONTIG_LENGTH: 500
NUMBER_OF_PLOTS: 10
COVERAGE_WINDOW: 100
PILON_MEM: "8G"
MEGAHIT_MEM_FRACTION: 0.5

MULTIQC:     "TRUE"
DEDUPLICATE: "FALSE"
QUAST:       "FALSE"
GENOMAD:     "TRUE"
GENOMAD_DB:  "/Volumes/LaCie/REGIONEN/ref_dbs/GENOMAD_DB/genomad_db"
