channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.12
  - pip
  - pandas>=3
  - numpy>=2.5.0
  # Match the driver Snakemake to avoid pickle incompatibilities with the
  # `script:` directive (which transfers Snakemake.io objects between
  # processes via pickle and fails if classes have been renamed). The
  # driver is pinned to 9.23.* (see README install line, CLAUDE.md and
  # docs/REFRESH_TUTORIAL.md); keep this identical to it.
  - snakemake-minimal=9.23.*
  - pip:
      # Pin to a released tag rather than @main so the same pipeline
      # invocation on different days uses the same reportHanter code.
      # Bump this tag when intentionally rolling forward.
      - git+https://github.com/druvus/reporthanter.git@v0.10.4
