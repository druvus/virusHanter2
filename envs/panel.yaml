# Python deps consumed by the wrangling/parquet rules. The full Panel +
# Altair stack lives in the driver `virushanter` env (where reporthanter
# is installed); this env only needs to read/write data frames.
channels:
  - conda-forge
dependencies:
  - python>=3.11
  - pandas>=2.0
  - numpy>=1.24
  - pyfastx>=2.0
  - pyarrow>=14
