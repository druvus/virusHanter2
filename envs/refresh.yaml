channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.12
  - pandas>=2.0
  - pyarrow>=15
  - pyfastx>=2.1
  - wget
  - curl
  - gzip
  - grep
  # kraken2 is needed only for the `kraken2-inspect` call that
  # produces the overlap-with-Kraken2 sidecar; the index itself
  # comes from NCBI's pre-built tarball, not from this env.
  - kraken2
  # kaiju ships `kaiju-mkbwt` + `kaiju-mkfmi` for the local
  # protein-index build.
  - kaiju
  # BLAST+ ships `update_blastdb.pl` which the `refresh_blast`
  # rule drives to fetch NCBI's pre-built viral BLAST tarballs
  # (ref_viruses_rep_genomes, mito_rna_db, taxdb) into the
  # snapshot directory alongside the parquet and the Kaiju FMI.
  - blast>=2.16.0
  - perl-archive-tar
